<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화산들소 조우</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css">
  <style>
    :root {
      --bg-color: #1a100c; /* 어두운 화산암 배경 */
      --text-color: #f4d3a0; /* 낡은 양피지 글씨색 */
      --border-color: #d64a23; /* 끓어오르는 용암 테두리 */
      --bison-color: #e25822; /* 들소 텍스트 색 */
      --user-color: #a7d8de; /* 플레이어 텍스트 색 */
    }

    body {
      background-color: #000;
      color: var(--text-color);
      font-family: 'NeoDunggeunmo', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* 레트로 게임기 화면 틀 */
    .game-container {
      width: 100%;
      max-width: 600px;
      background-color: var(--bg-color);
      border: 4px solid var(--border-color);
      box-shadow: 8px 8px 0px #5e1c08;
      display: flex;
      flex-direction: column;
      height: 80vh;
      padding: 15px;
      box-sizing: border-box;
    }

    /* 상단 상태바 */
    .status-bar {
      border-bottom: 2px dashed var(--border-color);
      padding-bottom: 10px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      text-shadow: 2px 2px #000;
    }

    /* 대화창 영역 */
    .chat-box {
      flex-grow: 1;
      overflow-y: auto;
      padding: 10px;
      background-color: rgba(0, 0, 0, 0.5);
      border: 2px solid #5e1c08;
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* 스크롤바 숨기기 (깔끔한 픽셀 아트를 위해) */
    .chat-box::-webkit-scrollbar { width: 8px; }
    .chat-box::-webkit-scrollbar-thumb { background: var(--border-color); }

    .message { line-height: 1.5; font-size: 1.1rem; }
    .message.system { color: #888; text-align: center; }
    .message.user { color: var(--user-color); }
    .message.bison { color: var(--bison-color); text-shadow: 1px 1px #000; }

    /* 하단 입력 영역 */
    .input-area {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex-grow: 1;
      background-color: #000;
      color: #fff;
      border: 2px solid var(--border-color);
      padding: 10px;
      font-family: 'NeoDunggeunmo', sans-serif;
      font-size: 1.1rem;
      outline: none;
    }

    button {
      background-color: var(--border-color);
      color: #fff;
      border: 2px solid #fff;
      padding: 10px 20px;
      font-family: 'NeoDunggeunmo', sans-serif;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 4px 4px 0px #000;
    }

    button:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    button:disabled, input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="game-container">
    <div class="status-bar">
      <span>🌋 화산들소 조우</span>
      <span id="turn-display">남은 턴: 10</span>
    </div>

    <div class="chat-box" id="chat-box">
      <div class="message system">야생의 화산들소가 길을 막아섰다!<br>10턴 안에 들소를 설득해 지나가야 한다.</div>
    </div>

    <div class="input-area">
      <input type="text" id="user-input" placeholder="무엇을 할까?" autocomplete="off" />
      <button id="send-btn">행동</button>
    </div>
  </div>

  <script>
    const API_URL = "https://talk-to-bison.vercel.app/api/chat";
    let conversationHistory = []; // 대화 기록 저장
    let isGameOver = false;

    const chatBox = document.getElementById("chat-box");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const turnDisplay = document.getElementById("turn-display");

    // 화면에 메시지를 추가하는 함수
    function appendMessage(role, text) {
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("message", role);
      
      // 줄바꿈 처리
      const formattedText = text.replace(/\n/g, "<br>");
      
      if (role === 'user') msgDiv.innerHTML = `> 플레이어: ${formattedText}`;
      else if (role === 'bison') msgDiv.innerHTML = `🦬 들소: ${formattedText}`;
      else msgDiv.innerHTML = formattedText;

      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight; // 스크롤 맨 아래로
    }

    // 서버로 메시지 전송
    async function sendMessage() {
      if (isGameOver) return;
      
      const text = userInput.value.trim();
      if (!text) return;

      // 1. 유저 메시지 화면에 표시
      appendMessage("user", text);
      userInput.value = "";
      
      // UI 잠금 (로딩 중)
      userInput.disabled = true;
      sendBtn.disabled = true;
      sendBtn.innerText = "대기중...";

      try {
        // 2. 백엔드 API 호출
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userInput: text,
            conversationHistory: conversationHistory
          })
        });

        const data = await response.json();

        // 3. 서버에서 갱신된 대화 기록 저장
        conversationHistory = data.updatedHistory;

        // 4. 들소의 반응 화면에 표시 (시스템 태그 필터링)
        const cleanReply = data.bisonReply
            .replace("[CLEAR]", "")
            .replace("[GAMEOVER]", "")
            .trim();
        appendMessage("bison", cleanReply);

        // 남은 턴 수 업데이트
        const remainingTurns = 10 - data.currentTurn;
        turnDisplay.innerText = `남은 턴: ${Math.max(0, remainingTurns)}`;

        // 5. 게임 종료 판별
        if (data.gameStatus === "CLEAR") {
          appendMessage("system", "🎉 [GAME CLEAR] 화산들소가 만족한 듯 길을 비켜주었다!");
          endGame();
        } else if (data.gameStatus === "GAMEOVER") {
          appendMessage("system", "💀 [GAME OVER] 분노한 들소에게 들이받혀 날아갔다!");
          endGame();
        } else if (data.gameStatus === "TIMEOUT") {
          appendMessage("system", "🌋 [GAME OVER] 등 위의 화산이 폭발해 버렸다!");
          endGame();
        }

      } catch (error) {
        appendMessage("system", "통신 오류가 발생했습니다. 들소가 잠시 멈췄습니다.");
        console.error(error);
      } finally {
        if (!isGameOver) {
          userInput.disabled = false;
          sendBtn.disabled = false;
          sendBtn.innerText = "행동";
          userInput.focus();
        }
      }
    }

    function endGame() {
      isGameOver = true;
      userInput.disabled = true;
      sendBtn.disabled = true;
      sendBtn.innerText = "종료됨";
    }

    // 버튼 클릭 및 엔터 키 이벤트
    sendBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
